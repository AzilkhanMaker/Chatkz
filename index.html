<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatkz Ultimate Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        :root { --bg: #313338; --side: #2B2D31; --accent: #5865F2; }
        body { background: var(--bg); color: #dbdee1; font-family: sans-serif; }
        .sidebar { background: var(--side); }
        .msg-bubble { padding: 10px; border-radius: 8px; display: flex; align-items: flex-start; gap: 10px; transition: 0.2s; }
        .msg-bubble:hover { background: #2e3035; }
        .del-btn { opacity: 0; color: #ed4245; cursor: pointer; font-size: 12px; }
        .msg-bubble:hover .del-btn { opacity: 1; }
        #video-wrap { position: fixed; right: 0; top: 0; width: 400px; height: 100%; z-index: 100; display: none; background: #000; }
        @media (max-width: 768px) { .sidebar { display: none; } #video-wrap { width: 100%; } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="auth-screen" class="fixed inset-0 z-[1000] flex items-center justify-center bg-[#2b2d31]">
        <div class="bg-[#313338] p-8 rounded-lg shadow-2xl w-96 border border-black/50 text-center">
            <h2 class="text-3xl font-bold mb-6 text-white">Chatkz</h2>
            <input type="email" id="email" placeholder="Email" class="w-full p-3 bg-[#1e1f22] rounded mb-3 outline-none text-white border border-black">
            <input type="password" id="pass" placeholder="Пароль" class="w-full p-3 bg-[#1e1f22] rounded mb-6 outline-none text-white border border-black">
            <button onclick="handleAuth('login')" class="w-full bg-[#5865F2] text-white py-3 rounded font-bold mb-3 hover:bg-[#4752C4]">Войти</button>
            <button onclick="handleAuth('reg')" class="w-full text-sm text-gray-400 underline">Регистрация нового аккаунта</button>
        </div>
    </div>

    <div id="main-app" class="flex flex-1 overflow-hidden hidden">
        <aside class="sidebar w-64 p-4 flex flex-col border-r border-black/20">
            <div class="text-lg font-bold text-white mb-6">Chatkz Server</div>
            <div id="chat-msgs" class="flex-1 overflow-y-auto space-y-4"></div>
            
            <div class="pt-4 border-t border-white/10 mt-auto">
                <div id="user-info" class="font-bold text-sm mb-2 text-white"></div>
                <button onclick="auth.signOut(); location.reload()" class="w-full bg-red-600/10 hover:bg-red-600/20 text-red-400 py-2 rounded text-sm">Выйти из системы</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-[#313338]">
            <div id="chat-area" class="flex-1 overflow-y-auto p-6 space-y-2"></div>
            
            <div class="p-4 bg-[#383a40] mx-4 mb-4 rounded-lg flex items-center gap-3 border border-black/20">
                <input type="file" id="file-input" class="hidden" onchange="uploadFile(this)">
                <button onclick="document.getElementById('file-input').click()" class="text-gray-400 hover:text-white">📎</button>
                <input type="text" id="input" class="flex-1 bg-transparent outline-none text-white placeholder-gray-500" placeholder="Написать сообщение...">
                <button onclick="startVoiceRecord()" id="mic-btn" class="text-gray-400 hover:text-green-500">🎤</button>
            </div>
        </main>
    </div>

    <div id="video-wrap">
        <button onclick="closeVideo()" class="absolute top-2 right-2 z-[200] bg-red-600 px-4 py-1 rounded">Закрыть</button>
        <div id="meet" class="w-full h-full"></div>
    </div>

    <script>
        // 1. Инициализация (Вставь СВОИ данные проекта из Firebase Console)
        const config = {
            apiKey: "ТВОЙ_API_KEY",
            databaseURL: "ТВОЙ_DATABASE_URL",
            projectId: "ТВОЙ_PROJECT_ID",
            storageBucket: "ТВОЙ_STORAGE_BUCKET"
        };
        firebase.initializeApp(config);
        
        const auth = firebase.auth();
        const db = firebase.database();
        const storage = firebase.storage();
        
        // 2. Логика пользователей
        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-info').innerText = user.email + (user.email.includes('admin') ? ' 👑' : '');
                loadMessages();
            }
        });

        // 3. Ядро чата (дискорд-стиль)
        function loadMessages() {
            db.ref('messages').on('child_added', s => {
                const m = s.val();
                const div = document.createElement('div');
                div.className = 'msg-bubble';
                div.innerHTML = `
                    <div class="w-10 h-10 bg-indigo-500 rounded-full flex items-center justify-center font-bold">${m.u[0]}</div>
                    <div class="flex-1">
                        <b>${m.u}</b> <span class="text-xs text-gray-500">${new Date().toLocaleTimeString()}</span>
                        <div class="text-gray-300 mt-1">${m.t}</div>
                    </div>
                    ${(auth.currentUser.email === m.email || auth.currentUser.email.includes('admin')) ? 
                      `<span class="del-btn" onclick="delMsg('${s.key}')">Удалить</span>` : ''}
                `;
                document.getElementById('chat-area').appendChild(div);
            });
        }

        // 4. Медиа-сервер: Загрузка файлов
        async function uploadFile(e) {
            const file = e.target.files[0];
            const ref = storage.ref('uploads/' + Date.now() + file.name);
            await ref.put(file);
            const url = await ref.getDownloadURL();
            db.ref('messages').push({ u: auth.currentUser.email.split('@')[0], email: auth.currentUser.email, t: `<a href="${url}" target="_blank" class="text-blue-400">📎 ${file.name}</a>` });
        }

        // 5. Медиа-сервер: Голосовые
        let recorder;
        async function startVoiceRecord() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            recorder = new MediaRecorder(stream);
            let chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = async () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const ref = storage.ref('audio/' + Date.now());
                await ref.put(blob);
                const url = await ref.getDownloadURL();
                db.ref('messages').push({ u: auth.currentUser.email.split('@')[0], email: auth.currentUser.email, t: `<audio controls src="${url}"></audio>` });
            };
            recorder.start();
            setTimeout(() => recorder.stop(), 5000); // запись 5 секунд
        }

        // 6. Утилиты
        document.getElementById('input').onkeydown = e => {
            if(e.key === 'Enter' && e.target.value) {
                db.ref('messages').push({ u: auth.currentUser.email.split('@')[0], email: auth.currentUser.email, t: e.target.value });
                e.target.value = '';
            }
        };
        function delMsg(key) { db.ref('messages/' + key).remove(); location.reload(); }
        function handleAuth(m) {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            m === 'reg' ? auth.createUserWithEmailAndPassword(e, p) : auth.signInWithEmailAndPassword(e, p);
        }
    </script>
</body>
</html>
