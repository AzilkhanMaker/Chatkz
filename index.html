<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Chatkz Ultimate | Stable Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        :root { --bg: #313338; --side: #2B2D31; --text: #ffffff; --accent: #5865F2; --border: rgba(0,0,0,0.2); }
        body { background: var(--bg); color: var(--text); transition: 0.3s; font-family: sans-serif; }
        .sidebar { background: var(--side); }

        /* Видео-панель */
        #video-wrap {
            width: 380px; height: 100%; border-left: 1px solid var(--border);
            background: #000; display: none; flex-direction: column; transition: width 0.3s ease;
        }
        #video-wrap.wide { width: 100%; }
        #video-controls { display: flex; gap: 1px; background: var(--border); }
        #video-controls button { flex: 1; padding: 10px; font-size: 11px; font-weight: bold; color: white; }
        .btn-close { background: #F23F42; }
        .btn-toggle { background: #4E5058; }

        /* Список пользователей */
        .user-card { background: var(--bg); padding: 8px; border-radius: 4px; margin-bottom: 4px; font-size: 13px; display: flex; align-items: center; border: 1px solid var(--border); }
        .user-status { width: 8px; height: 8px; background: #23A55A; border-radius: 50%; margin-right: 8px; }

        /* Селфи-камера */
        #self-view { position: fixed; bottom: 20px; right: 20px; width: 150px; height: 100px; background: #000; border: 2px solid var(--accent); border-radius: 8px; display: none; z-index: 100; }
        
        /* Скроллбары */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-[#313338]">
        <div class="bg-white p-8 rounded-lg shadow-2xl w-80 text-black text-center">
            <h2 class="text-2xl font-bold mb-6 text-[#5865F2]">Chatkz</h2>
            <div id="auth-loading" class="text-xs text-gray-500 mb-4 italic">Синхронизация...</div>
            <div id="auth-form" class="hidden">
                <input type="email" id="email" placeholder="Email" class="w-full p-2 border mb-2 rounded outline-none shadow-inner">
                <input type="password" id="pass" placeholder="Пароль" class="w-full p-2 border mb-4 rounded outline-none shadow-inner">
                <button onclick="handleAuth('login')" class="w-full bg-[#5865F2] text-white py-2 rounded font-bold hover:bg-[#4752C4] mb-2">Войти</button>
                <button onclick="handleAuth('reg')" class="w-full text-sm text-gray-500 hover:underline">Создать аккаунт</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="flex flex-1 hidden">
        <nav class="w-16 bg-[#1E1F22] flex flex-col items-center py-4 space-y-4 shadow-xl">
            <div class="w-12 h-12 bg-[#5865F2] rounded-2xl flex items-center justify-center font-bold">CK</div>
            <div id="admin-add" class="hidden w-12 h-12 bg-[#313338] rounded-full flex items-center justify-center text-green-500">+</div>
        </nav>

        <aside class="sidebar w-60 flex flex-col border-r border-black/10">
            <div class="p-4 font-bold border-b border-black/10">Chatkz Server</div>
            <div class="flex-1 p-2 space-y-1 overflow-y-auto">
                <div class="p-2 bg-black/10 rounded cursor-pointer font-medium text-sm"># общий</div>
                <div onclick="openVideo()" class="p-2 hover:bg-black/5 rounded cursor-pointer flex items-center text-indigo-400 text-sm font-bold">
                    <span class="mr-2">🔊</span> Голосовой канал
                </div>
            </div>

            <div id="user-list" class="p-2 border-t border-white/5 bg-black/5">
                <div class="text-[10px] uppercase font-bold text-gray-500 mb-2 px-1">В сети</div>
                <div id="users-container" class="space-y-1"></div>
            </div>

            <div class="p-3 bg-black/20 text-xs space-y-2">
                <button onclick="toggleSelfView()" class="w-full p-2 bg-indigo-500/10 border border-indigo-500/30 rounded text-indigo-300 hover:bg-indigo-500/20">📷 Камера</button>
                <button onclick="logOut()" class="w-full p-2 bg-red-500/10 border border-red-500/50 rounded text-red-400 hover:bg-red-500 hover:text-white transition font-bold uppercase">🚪 Выйти</button>
                <input type="password" id="admin-input" placeholder="Код админа..." oninput="checkAdmin()" class="w-full bg-black/20 border border-white/5 p-1 rounded outline-none text-white text-[10px]">
            </div>
        </aside>

        <main class="flex-1 flex flex-row bg-transparent">
            <div class="flex-1 flex flex-col min-w-0">
                <div id="chat-msgs" class="flex-1 overflow-y-auto p-4 space-y-2 text-sm"></div>
                <div class="p-4 bg-black/5">
                    <input type="text" id="input" class="w-full bg-black/10 p-3 rounded-lg outline-none border border-white/5 text-white focus:border-[#5865F2]" placeholder="Написать сообщение...">
                </div>
            </div>

            <div id="video-wrap">
                <div id="video-controls">
                    <button onclick="toggleWide()" class="btn-toggle">⇳ РАСШИРИТЬ</button>
                    <button onclick="closeVideo()" class="btn-close">ВЫЙТИ</button>
                </div>
                <div id="meet" class="flex-1"></div>
            </div>
        </main>
    </div>

    <video id="self-view" autoplay muted playsinline></video>

    <script>
        const config = {
            apiKey: "AIzaSyCRQBj8tYWE7jR00SodWWBNEKq_m-Vfoyo",
            databaseURL: "https://chatkz-7d4a8-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "chatkz-7d4a8"
        };
        firebase.initializeApp(config);
        const auth = firebase.auth();
        const db = firebase.database();

        let jitsiApi = null;
        let isAdmin = false;

        // --- ЛОГИКА АВТОРИЗАЦИИ (БЕЗ ВЫЛЕТОВ) ---
        auth.onAuthStateChanged(user => {
            if(user) {
                // Если сессия найдена
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                initApp(user);
            } else {
                // Если нужно войти
                document.getElementById('auth-loading').classList.add('hidden');
                document.getElementById('auth-form').classList.remove('hidden');
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        async function handleAuth(m) {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            if(!e || !p) return alert("Заполните поля!");
            try {
                // Устанавливаем сохранение в браузере (Persistence)
                await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
                if(m === 'reg') await auth.createUserWithEmailAndPassword(e, p);
                else await auth.signInWithEmailAndPassword(e, p);
            } catch(err) { alert(err.message); }
        }

        function logOut() {
            if (confirm("Выйти из аккаунта?")) {
                const user = auth.currentUser;
                if(user) db.ref('presence/' + user.uid).remove();
                auth.signOut().then(() => window.location.reload());
            }
        }

        // --- ИНИЦИАЛИЗАЦИЯ ПОСЛЕ ВХОДА ---
        function initApp(user) {
            const myName = user.email.split('@')[0];
            db.ref('presence/' + user.uid).set({ name: myName });
            db.ref('presence/' + user.uid).onDisconnect().remove();
            
            syncChat(myName);
            syncUsers();
        }

        function syncUsers() {
            db.ref('presence').on('value', s => {
                const container = document.getElementById('users-container');
                container.innerHTML = '';
                s.forEach(d => {
                    container.innerHTML += `<div class="user-card"><div class="user-status"></div>${d.val().name}</div>`;
                });
            });
        }

        function syncChat(myName) {
            db.ref('messages').limitToLast(30).on('value', s => {
                const box = document.getElementById('chat-msgs');
                box.innerHTML = '';
                s.forEach(d => {
                    const m = d.val();
                    const nameColor = m.u === myName ? 'text-indigo-400' : 'text-[#5865F2]';
                    box.innerHTML += `<div><b class="${nameColor}">${m.u}:</b> <span>${m.t}</span></div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        document.getElementById('input').onkeypress = e => {
            if(e.key === 'Enter' && e.target.value) {
                db.ref('messages').push({ u: auth.currentUser.email.split('@')[0], t: e.target.value });
                e.target.value = '';
            }
        };

        // --- ВИДЕО-ФУНКЦИИ ---
        function openVideo() {
            document.getElementById('video-wrap').style.display = 'flex';
            if(jitsiApi) jitsiApi.dispose();
            jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", {
                roomName: "Chatkz_Global_Room",
                width: "100%", height: "100%",
                parentNode: document.getElementById('meet'),
                userInfo: { displayName: auth.currentUser.email.split('@')[0] }
            });
        }

        function closeVideo() {
            if(jitsiApi) jitsiApi.dispose();
            document.getElementById('video-wrap').style.display = 'none';
        }

        function toggleWide() { document.getElementById('video-wrap').classList.toggle('wide'); }

        async function toggleSelfView() {
            const v = document.getElementById('self-view');
            if(v.style.display === 'block') {
                v.style.display = 'none';
                if(v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
            } else {
                v.style.display = 'block';
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                v.srcObject = stream;
            }
        }

        function checkAdmin() {
            if(document.getElementById('admin-input').value === "PO-432") {
                isAdmin = true;
                document.getElementById('admin-add').classList.remove('hidden');
                alert("Админ-доступ активирован");
            }
        }
    </script>
</body>
</html>
