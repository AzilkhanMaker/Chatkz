<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Nexord Ultimate</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js" type="module"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="https://meet.jit.si/external_api.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{

--bg:#1e1f22;
--sidebar:#2b2d31;
--channel:#313338;
--accent:#5865f2;
--text:#f2f3f5;
--hover:#3c3f45;

}

body{

background:var(--bg);
color:var(--text);
font-family:Inter,sans-serif;
overflow:hidden;

}

::-webkit-scrollbar{
width:7px;
}

::-webkit-scrollbar-thumb{
background:#111;
border-radius:10px;
}

.fade{
animation:fade .25s ease;
}

@keyframes fade{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.server-icon{

width:52px;
height:52px;
border-radius:18px;
transition:.2s;
cursor:pointer;

}

.server-icon:hover{

border-radius:14px;
background:#5865f2;

}

.channel{

padding:12px;
border-radius:10px;
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
transition:.15s;

}

.channel:hover{

background:var(--hover);

}

.message:hover{

background:rgba(255,255,255,.03);

}

.actions{

opacity:0;
transition:.15s;

}

.message:hover .actions{

opacity:1;

}

.mobile-sidebar{

transition:.25s;

}

@media(max-width:900px){

.serverbar{
display:none;
}

.mobile-sidebar{

position:fixed;
left:-100%;
top:0;
width:85%;
height:100%;
z-index:9999;

}

.mobile-sidebar.active{

left:0;

}

.members{
display:none;
}

}

</style>
</head>

<body>

<div id="authScreen"
class="fixed inset-0 bg-black/70 z-[99999] flex items-center justify-center">

<div class="bg-[#2b2d31] p-8 rounded-3xl w-[400px] border border-white/10">

<h1 class="text-5xl font-black text-center mb-2">
NEXORD
</h1>

<p class="text-center text-gray-400 mb-6">
Ultimate Platform
</p>

<input
id="email"
type="email"
placeholder="Email"
class="w-full p-4 rounded-xl bg-[#1e1f22] outline-none mb-3"
/>

<input
id="password"
type="password"
placeholder="Password"
class="w-full p-4 rounded-xl bg-[#1e1f22] outline-none mb-5"
/>

<button
onclick="login()"
class="w-full bg-[#5865f2] py-4 rounded-xl font-bold mb-3">
Войти
</button>

<button
onclick="register()"
class="w-full bg-[#232428] py-4 rounded-xl font-bold">
Создать аккаунт
</button>

</div>
</div>

<div class="h-screen flex">

<div class="serverbar w-[72px] bg-[#111214] flex flex-col items-center py-3 gap-3">

<div class="server-icon bg-[#5865f2] flex items-center justify-center font-black text-2xl">
N
</div>

<div class="server-icon bg-[#2b2d31] flex items-center justify-center">
🎮
</div>

<div class="server-icon bg-[#2b2d31] flex items-center justify-center">
💻
</div>

<div class="server-icon bg-[#2b2d31] flex items-center justify-center">
🎵
</div>

</div>

<div
id="sidebar"
class="mobile-sidebar w-[280px] bg-[#2b2d31] flex flex-col">

<div class="p-4 border-b border-black/20">

<div class="flex items-center justify-between">

<h2 class="font-black text-lg">
Nexord Community
</h2>

<button onclick="createChannel()">
+
</button>

</div>

</div>

<div
id="channelList"
class="flex-1 overflow-y-auto p-2">

<div
onclick="switchChannel('general')"
class="channel bg-[#404249]">

#
general

</div>

<div
onclick="switchChannel('media')"
class="channel">

#
media

</div>

<div
onclick="switchChannel('gaming')"
class="channel">

#
gaming

</div>

<div
onclick="switchChannel('voice')"
class="channel">

🔊
voice

</div>

</div>

<div class="bg-[#232428] p-3 flex items-center justify-between">

<div class="flex items-center gap-3">

<div
id="avatar"
class="w-10 h-10 rounded-full bg-[#5865f2] flex items-center justify-center font-black">
U
</div>

<div>

<div id="username" class="font-bold text-sm">
Unknown
</div>

<div class="text-xs text-green-400">
Online
</div>

</div>

</div>

<div class="flex gap-2">

<button onclick="toggleTheme()">
🌙
</button>

<button onclick="logout()">
🚪
</button>

</div>

</div>

</div>

<div class="flex-1 flex flex-col bg-[#313338]">

<div class="h-[60px] border-b border-black/20 flex items-center justify-between px-5">

<div class="flex items-center gap-3">

<button
onclick="toggleSidebar()"
class="text-2xl lg:hidden">
☰
</button>

<span class="text-gray-400">
#
</span>

<span id="currentChannel" class="font-bold">
general
</span>

</div>

<div class="flex items-center gap-3">

<input
id="search"
placeholder="Поиск"
class="bg-[#1e1f22] px-4 py-2 rounded-lg outline-none text-sm"
/>

<button onclick="startCall()">
📞
</button>

<button onclick="startVideo()">
🎥
</button>

</div>

</div>

<div
id="messages"
class="flex-1 overflow-y-auto"></div>

<div
id="typingBox"
class="px-5 py-2 text-xs text-gray-400 hidden">

Кто-то печатает...

</div>

<div class="p-5">

<div class="bg-[#383a40] rounded-2xl p-3 flex items-end gap-3">

<button onclick="toggleEmoji()">
😀
</button>

<button onclick="openAttachmentMenu()">
📎
</button>

<button onclick="createCircleMessage()">
⭕
</button>

<button onclick="requestPermissions('mic')">
🎤
</button>

<textarea
id="messageInput"
placeholder="Написать сообщение..."
class="flex-1 bg-transparent outline-none resize-none"></textarea>

<button
onclick="sendMessage()"
class="bg-[#5865f2] px-5 py-3 rounded-xl font-bold">

Отправить

</button>

</div>

<emoji-picker
id="emojiPicker"
style="
display:none;
position:absolute;
bottom:100px;
left:20px;
z-index:9999;
"></emoji-picker>

</div>

</div>

<div
class="members w-[340px] bg-[#232428] border-l border-black/20 flex flex-col">

<div class="p-4 border-b border-black/20 font-black">

Онлайн —
<span id="onlineCount">
0
</span>

</div>

<div
id="members"
class="flex-1 overflow-y-auto p-3"></div>

</div>

</div>

<div
id="videoModal"
class="hidden fixed inset-0 bg-black/70 z-[99999] items-center justify-center">

<div class="w-[90%] h-[90%] bg-black rounded-3xl overflow-hidden relative">

<button
onclick="closeVideo()"
class="absolute top-4 right-4 bg-red-500 px-5 py-3 rounded-xl z-50">

Закрыть

</button>

<div id="jitsi" class="w-full h-full"></div>

</div>

</div>

<script>

const firebaseConfig = {
    apiKey: "AIzaSyCRQBj8tYWE7jR00SodWWBNEKq_m-Vfoyo",
    authDomain: "chatkz-7d4a8.firebaseapp.com",
    databaseURL: "https://chatkz-7d4a8-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "chatkz-7d4a8",
    messagingSenderId: "118207929174",
    appId: "1:118207929174:web:242c085bac1b43262694f7",
    measurementId: "G-2JP12S9BCM"

};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let currentUser = null;
let currentChannel = 'general';
let emojiVisible = false;

const messages = document.getElementById('messages');
const input = document.getElementById('messageInput');

function notify(text,error=false){

const n=document.createElement('div');

n.className=`
fixed right-5 bottom-5
px-5 py-4
rounded-2xl
z-[99999]
shadow-2xl
fade
${error?'bg-red-500':'bg-[#5865f2]'}
`;

n.innerText=text;

document.body.appendChild(n);

setTimeout(()=>n.remove(),3000);

}

function permissionError(text){

const div=document.createElement('div');

div.className=`
fixed inset-0 bg-black/70
z-[99999]
flex items-center justify-center
`;

div.innerHTML=`

<div class="
bg-[#2b2d31]
p-8
rounded-3xl
w-[350px]
text-center
border border-white/10
">

<div class="text-5xl mb-4">
🔒
</div>

<div class="text-xl font-bold mb-2">
Нет доступа
</div>

<div class="text-gray-400 mb-6">
${text}
</div>

<button
onclick="this.parentElement.parentElement.remove()"
class="bg-[#5865f2] px-5 py-3 rounded-xl font-bold">

Закрыть

</button>

</div>

`;

document.body.appendChild(div);

}

async function requestPermissions(type){

try{

if(type==='mic'){

await navigator.mediaDevices.getUserMedia({
audio:true
});

}

if(type==='camera'){

await navigator.mediaDevices.getUserMedia({
video:true
});

}

notify('Разрешение получено');

}catch{

permissionError('Разрешение отклонено');

}

}

function register(){

const email=document.getElementById('email').value;
const password=document.getElementById('password').value;

auth
.createUserWithEmailAndPassword(email,password)
.then(()=>notify('Аккаунт создан'))
.catch(e=>notify(e.message,true));

}

function login(){

const email=document.getElementById('email').value;
const password=document.getElementById('password').value;

auth
.signInWithEmailAndPassword(email,password)
.catch(e=>notify(e.message,true));

}

function logout(){

auth.signOut();

location.reload();

}

auth.onAuthStateChanged(user=>{

if(!user) return;

currentUser=user;

document.getElementById('authScreen').style.display='none';

const username=user.email.split('@')[0];

document.getElementById('username').innerText=username;

document.getElementById('avatar').innerText=
username[0].toUpperCase();

db.ref('presence/'+user.uid).set({

username,
online:true

});

loadMessages();
loadMembers();

});

function switchChannel(channel){

currentChannel=channel;

document.getElementById('currentChannel')
.innerText=channel;

messages.innerHTML='';

loadMessages();

}

function sendMessage(){

if(!input.value.trim()) return;

db.ref('channels/'+currentChannel).push({

user:currentUser.email.split('@')[0],
text:escapeHtml(input.value),
time:Date.now()

});

input.value='';

}

function loadMessages(){

messages.innerHTML='';

db.ref('channels/'+currentChannel).off();

db.ref('channels/'+currentChannel)
.on('child_added',snap=>{

renderMessage(snap.val(),snap.key);

messages.scrollTop=messages.scrollHeight;

});

}

function renderMessage(data,key){

const div=document.createElement('div');

div.className=`
message fade
p-4 flex gap-4 relative
`;

div.innerHTML=`

<div class="
w-12 h-12 rounded-full
bg-[#5865f2]
flex items-center justify-center
font-black text-lg
">

${data.user[0].toUpperCase()}

</div>

<div class="flex-1">

<div class="flex items-center gap-3 mb-1">

<span class="font-bold">
${data.user}
</span>

<span class="text-xs text-gray-500">
${new Date(data.time).toLocaleString()}
</span>

</div>

<div class="break-words">
${data.text||''}
</div>

${data.image?`

<img
src="${data.image}"
onclick="previewImage('${data.image}')"
class="
mt-3
rounded-2xl
max-w-[350px]
cursor-pointer
hover:opacity-90
transition
"
/>

`:''}

${data.youtube?`

<iframe
class="
mt-3
rounded-2xl
w-full
max-w-[500px]
aspect-video
"
src="${data.youtube.replace('watch?v=','embed/')}"
allowfullscreen>
</iframe>

`:''}

${data.sticker?`

<img
src="${data.sticker}"
class="
mt-3
w-[170px]
h-[170px]
object-contain
"
/>

`:''}

${data.circle?`

<video
controls
src="${data.circle}"
class="
mt-3
w-[220px]
h-[220px]
rounded-full
object-cover
border-4 border-[#5865f2]
">
</video>

`:''}

</div>

<div class="
actions
absolute right-5 top-5
flex gap-2
">

<button onclick="replyMessage('${data.user}')">
↩
</button>

<button onclick="reactMessage('🔥')">
🔥
</button>

<button onclick="removeMessage('${key}')">
🗑
</button>

</div>

`;

messages.appendChild(div);

}

function removeMessage(id){

db.ref('channels/'+currentChannel+'/'+id)
.remove();

}

function replyMessage(user){

input.value='@'+user+' ';

input.focus();

}

function reactMessage(emoji){

notify('Реакция '+emoji);

}

function escapeHtml(text){

return text
.replace(/</g,'&lt;')
.replace(/>/g,'&gt;');

}

function toggleEmoji(){

emojiVisible=!emojiVisible;

document.getElementById('emojiPicker').style.display=
emojiVisible?'block':'none';

}

document
.querySelector('emoji-picker')
.addEventListener('emoji-click',e=>{

input.value+=e.detail.unicode;

});

function openAttachmentMenu(){

const type=prompt(
`1 - GIF/Image
2 - YouTube
3 - Sticker`
);

if(type==='1'){

const url=prompt('URL');

if(!url) return;

db.ref('channels/'+currentChannel).push({

user:currentUser.email.split('@')[0],
image:url,
text:'Медиа',
time:Date.now()

});

}

if(type==='2'){

const url=prompt('YouTube URL');

if(!url) return;

db.ref('channels/'+currentChannel).push({

user:currentUser.email.split('@')[0],
youtube:url,
text:'Видео',
time:Date.now()

});

}

if(type==='3'){

const url=prompt('Sticker URL');

if(!url) return;

db.ref('channels/'+currentChannel).push({

user:currentUser.email.split('@')[0],
sticker:url,
text:'',
time:Date.now()

});

}

}

async function createCircleMessage(){

try{

const stream=
await navigator.mediaDevices.getUserMedia({

video:true,
audio:true

});

notify('Кружок записывается');

const recorder=new MediaRecorder(stream);

let chunks=[];

recorder.ondataavailable=e=>chunks.push(e.data);

recorder.onstop=()=>{

const blob=new Blob(chunks,{
type:'video/webm'
});

const url=URL.createObjectURL(blob);

db.ref('channels/'+currentChannel).push({

user:currentUser.email.split('@')[0],
circle:url,
text:'',
time:Date.now()

});

notify('Кружок отправлен');

};

recorder.start();

setTimeout(()=>recorder.stop(),10000);

}catch{

permissionError('Нет доступа к камере/микрофону');

}

}

function previewImage(url){

const modal=document.createElement('div');

modal.className=`
fixed inset-0 bg-black/90
flex items-center justify-center
z-[99999]
`;

modal.innerHTML=`

<img
src="${url}"
class="
max-w-[95%]
max-h-[95%]
rounded-2xl
"
/>

`;

modal.onclick=()=>modal.remove();

document.body.appendChild(modal);

}

function startCall(){

notify('Voice connected');

}

function startVideo(){

document
.getElementById('videoModal')
.classList.remove('hidden');

document
.getElementById('videoModal')
.classList.add('flex');

new JitsiMeetExternalAPI('meet.jit.si',{

roomName:'NexordUltimateRoom',

parentNode:document.getElementById('jitsi'),

width:'100%',
height:'100%'

});

}

function closeVideo(){

location.reload();

}

function loadMembers(){

db.ref('presence')
.on('value',snap=>{

const members=document.getElementById('members');

members.innerHTML='';

let count=0;

snap.forEach(user=>{

count++;

const data=user.val();

members.innerHTML+=`

<div class="
flex items-center gap-3
p-2 rounded-lg
hover:bg-white/5
">

<div class="
w-10 h-10 rounded-full
bg-[#5865f2]
flex items-center justify-center
font-bold
">

${data.username[0].toUpperCase()}

</div>

<div>

<div>
${data.username}
</div>

<div class="text-xs text-green-400">
Online
</div>

</div>

</div>

`;

});

document.getElementById('onlineCount')
.innerText=count;

});

}

function createChannel(){

const name=prompt('Название канала');

if(!name) return;

const wrap=document.getElementById('channelList');

const div=document.createElement('div');

div.className='channel';

div.innerHTML=`

#
${name}

`;

div.onclick=()=>switchChannel(name);

wrap.appendChild(div);

}

function toggleTheme(){

if(
document.body.style.filter===
'invert(1) hue-rotate(180deg)'
){

document.body.style.filter='';

}else{

document.body.style.filter=
'invert(1) hue-rotate(180deg)';

}

}

function toggleSidebar(){

document
.getElementById('sidebar')
.classList.toggle('active');

}

input.addEventListener('keydown',e=>{

if(
e.key==='Enter' &&
!e.shiftKey
){

e.preventDefault();

sendMessage();

}

db.ref('typing/'+currentChannel).set({

user:currentUser.email

});

setTimeout(()=>{

db.ref('typing/'+currentChannel)
.remove();

},1200);

});

db.ref('typing')
.on('value',snap=>{

if(snap.exists()){

document
.getElementById('typingBox')
.classList.remove('hidden');

}else{

document
.getElementById('typingBox')
.classList.add('hidden');

}

});

window.addEventListener('beforeunload',()=>{

if(currentUser){

db.ref('presence/'+currentUser.uid)
.remove();

}

});

</script>

</body>
</html>
