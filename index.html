<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Chatkz Ultimate | Jitsi Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        :root { 
            --bg: #313338; 
            --side: #2B2D31; 
            --text: #ffffff; 
            --accent: #5865F2;
            --border: rgba(0,0,0,0.2);
        }
        .light { 
            --bg: #ffffff; 
            --side: #f2f3f5; 
            --text: #060607; 
            --border: rgba(0,0,0,0.1);
        }
        body { background: var(--bg); color: var(--text); transition: 0.3s; }
        .sidebar { background: var(--side); }

        /* Панель видео (правая колонка) */
        #video-wrap {
            width: 380px;
            height: 100%;
            border-left: 1px solid var(--border);
            background: #000000;
            display: none; /* Скрыто по умолчанию */
            flex-direction: column;
            flex-shrink: 0;
        }

        /* Кнопка закрытия */
        #video-wrap button {
            width: 100%;
            padding: 12px;
            background: #F23F42;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--side); }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.3); border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-[#5865F2]">
        <div class="bg-white p-8 rounded-lg shadow-2xl w-80 text-black">
            <h2 id="t-welcome" class="text-xl font-bold mb-4 text-center">Chatkz</h2>
            <input type="email" id="email" placeholder="Email" class="w-full p-2 border mb-2 rounded outline-none">
            <input type="password" id="pass" placeholder="Пароль" class="w-full p-2 border mb-4 rounded outline-none">
            <button onclick="handleAuth('login')" class="w-full bg-[#5865F2] text-white py-2 rounded font-bold hover:bg-[#4752C4]">Войти</button>
            <button onclick="handleAuth('reg')" class="w-full text-sm text-gray-400 mt-2">Создать аккаунт</button>
        </div>
    </div>

    <div id="main-app" class="flex flex-1 hidden">
        <nav class="w-16 bg-[#1E1F22] flex flex-col items-center py-4 space-y-4">
            <div class="w-12 h-12 bg-[#5865F2] rounded-2xl flex items-center justify-center font-bold">CK</div>
            <div id="admin-add" class="hidden w-12 h-12 bg-[#313338] rounded-full flex items-center justify-center text-green-500 cursor-pointer hover:bg-green-500 hover:text-white transition">+</div>
        </nav>

        <aside class="sidebar w-60 flex flex-col border-r border-black/10">
            <div class="p-4 font-bold shadow-sm">Chatkz Server</div>
            <div class="flex-1 p-2 space-y-1">
                <div class="p-2 bg-black/10 rounded cursor-pointer font-medium"># <span id="t-gen">общий</span></div>
                <div onclick="openVideo()" class="p-2 hover:bg-black/5 rounded cursor-pointer flex items-center text-indigo-400">
                    <span class="mr-2">🔊</span> <span id="t-call">Голосовой канал</span>
                </div>
            </div>
            <div class="p-3 bg-black/10 text-xs space-y-2">
                <select id="lang" onchange="updateLang()" class="w-full bg-transparent border border-white/20 p-1 rounded">
                    <option value="ru">Русский</option>
                    <option value="en">English</option>
                    <option value="kz">Қазақша</option>
                </select>
                <button onclick="document.body.classList.toggle('light')" class="w-full text-left p-1 border border-white/20 rounded">🌓 <span id="t-theme">Тема</span></button>
                <input type="password" id="admin-input" placeholder="Код админа..." oninput="checkAdmin()" class="w-full bg-transparent border border-white/20 p-1 rounded outline-none text-white">
            </div>
        </aside>

        <main class="flex-1 flex flex-row bg-transparent">
            <div class="flex-1 flex flex-col min-w-0">
                <div id="chat-msgs" class="flex-1 overflow-y-auto p-4 space-y-2 text-sm"></div>
                <div class="p-4">
                    <input type="text" id="input" class="w-full bg-black/10 p-3 rounded-lg outline-none border border-white/5 focus:border-[#5865F2] text-white" placeholder="Написать...">
                </div>
            </div>

            <div id="video-wrap">
                <div id="meet" class="flex-1"></div>
                <button onclick="closeVideo()">ЗАКРЫТЬ ЗВОНОК</button>
            </div>
        </main>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyCRQBj8tYWE7jR00SodWWBNEKq_m-Vfoyo",
            databaseURL: "https://chatkz-7d4a8-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "chatkz-7d4a8"
        };
        firebase.initializeApp(config);
        const auth = firebase.auth();
        const db = firebase.database();

        const dict = {
            ru: { welcome: "С возвращением!", gen: "общий", call: "Видео-связь", theme: "Тема" },
            en: { welcome: "Welcome back!", gen: "general", call: "Video Call", theme: "Theme" },
            kz: { welcome: "Қош келдіңіз!", gen: "жалпы", call: "Бейне қоңырау", theme: "Тақырып" }
        };

        function updateLang() {
            const l = document.getElementById('lang').value;
            document.getElementById('t-welcome').innerText = dict[l].welcome;
            document.getElementById('t-gen').innerText = dict[l].gen;
            document.getElementById('t-call').innerText = dict[l].call;
            document.getElementById('t-theme').innerText = dict[l].theme;
        }

        let isAdmin = false;
        function checkAdmin() {
            if(document.getElementById('admin-input').value === "PO-432") {
                isAdmin = true;
                document.getElementById('admin-add').classList.remove('hidden');
                alert("Админ-режим включен!");
            }
        }

        async function handleAuth(m) {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            try {
                if(m === 'reg') await auth.createUserWithEmailAndPassword(e, p);
                else await auth.signInWithEmailAndPassword(e, p);
            } catch(err) { alert(err.message); }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                syncChat();
            }
        });

        function syncChat() {
            db.ref('messages').limitToLast(40).on('value', s => {
                const box = document.getElementById('chat-msgs');
                box.innerHTML = '';
                s.forEach(d => {
                    const m = d.val();
                    const del = isAdmin ? `<span class="text-red-500 cursor-pointer ml-2" onclick="db.ref('messages/${d.key}').remove()">[удалить]</span>` : '';
                    box.innerHTML += `<div><b class="text-[#5865F2]">${m.u.split('@')[0]}:</b> <span>${m.t}</span>${del}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        document.getElementById('input').onkeypress = e => {
            if(e.key === 'Enter' && e.target.value) {
                db.ref('messages').push({ u: auth.currentUser.email, t: e.target.value });
                e.target.value = '';
            }
        };

        let jitsiApi = null;
        function openVideo() {
            const wrap = document.getElementById('video-wrap');
            wrap.style.display = 'flex';
            
            const meet = document.getElementById('meet');
            meet.innerHTML = "";

            const options = {
                roomName: "Chatkz_Room_123",
                width: "100%",
                height: "100%",
                parentNode: meet,
                userInfo: { displayName: auth.currentUser.email.split('@')[0] },
                interfaceConfigOverwrite: {
                    TOOLBAR_BUTTONS: ['microphone', 'camera', 'desktop', 'hangup']
                }
            };
            jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", options);
        }

        function closeVideo() {
            if(jitsiApi) jitsiApi.dispose();
            document.getElementById('video-wrap').style.display = 'none';
        }
    </script>
</body>
</html>
